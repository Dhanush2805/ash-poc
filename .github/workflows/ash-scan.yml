name: ASH Security Scan

on:

  pull_request:
    branches: 
      - ash-poc   
  push:
    branches:
      - ash-poc    
permissions:
  contents: read    
  security-events: write
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install ASH
        run: pip install git+https://github.com/awslabs/automated-security-helper.git@v3.5.4
      - name: Run ASH scan
        run: ash --mode local
      - name: Upload ASH results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ash-results
          path: .ash/ash_output

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .ash/ash_output/reports/ash.sarif          
